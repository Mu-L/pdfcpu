name: Build Windows 7 Artifact

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version string embedded into pdfcpu.exe
        required: false
        default: ''
      ref:
        description: Optional branch, tag, or commit to check out
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build-win7:
    name: Build Windows 7 x86_64 artifact
    runs-on: ubuntu-latest

    env:
      GO_WIN7_TAG: patched-1.25.4
      GO_WIN7_SHA256: c8186c4a1b9e9c08a7b46f85ed0cd6c44c8efe7267c37c745e4265fe5c44f781
      GO_WIN7_URL: https://github.com/XTLS/go-win7/releases/download/patched-1.25.4/go-for-win7-linux-amd64.zip

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Download patched Go SDK
        run: |
          curl -fsSL "$GO_WIN7_URL" -o /tmp/go-for-win7.zip
          echo "$GO_WIN7_SHA256  /tmp/go-for-win7.zip" | sha256sum -c -
          unzip -q /tmp/go-for-win7.zip -d /tmp/go-win7
          /tmp/go-win7/bin/go version

      - name: Build pdfcpu.exe
        run: |
          set -euo pipefail

          version="${{ inputs.version }}"
          if [ -z "$version" ]; then
            version="$(git describe --tags --always --dirty)"
          fi

          commit="$(git rev-parse --short HEAD)"
          date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          archive="pdfcpu_${version}_Windows_x86_64_win7"

          mkdir -p dist-win7 "$archive"

          GOTOOLCHAIN=local \
          GOOS=windows \
          GOARCH=amd64 \
          CGO_ENABLED=0 \
          /tmp/go-win7/bin/go build \
            -trimpath \
            -ldflags "-s -w -X main.version=$version -X github.com/pdfcpu/pdfcpu/pkg/pdfcpu.VersionStr=$version -X main.commit=$commit -X main.date=$date -X main.builtBy=go-win7-$GO_WIN7_TAG" \
            -o "$archive/pdfcpu.exe" \
            ./cmd/pdfcpu

          zip -qr "dist-win7/$archive.zip" "$archive"
          sha256sum "dist-win7/$archive.zip" > "dist-win7/$archive.zip.sha256"

      - name: Upload Windows 7 artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdfcpu_Windows_x86_64_win7
          path: |
            dist-win7/*.zip
            dist-win7/*.sha256
          retention-days: 30
